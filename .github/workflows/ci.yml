name: CI (Tests & Linting)

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: mysql
      DB_DATABASE: testing
      DB_USERNAME: sail
      DB_PASSWORD: password
      DB_HOST: mysql
      DB_PORT: 3306

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, mysql, redis, xml, ctype, iconv
          coverage: none

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Set CI Environment Variables
        run: |
          echo "WWWGROUP=1000" >> .env
          echo "WWWUSER=1000" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=mysql" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=testing" >> .env
          echo "DB_USERNAME=sail" >> .env
          echo "DB_PASSWORD=password" >> .env

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Start Required Docker Containers
        run: docker compose up -d --build laravel.test mysql redis

      - name: Wait for MySQL
        run: |
          until docker compose exec -T mysql mysqladmin ping -p"${DB_PASSWORD}" --silent; do
            sleep 2
          done

      - name: Generate Application Key
        run: docker compose exec -T laravel.test php artisan key:generate

      - name: Run Database Migrations
        run: docker compose exec -T laravel.test php artisan migrate --force

      - name: Run Laravel Pint
        run: docker compose exec -T laravel.test ./vendor/bin/pint --test

      - name: Run PHPUnit Tests
        run: docker compose exec -T laravel.test php artisan test